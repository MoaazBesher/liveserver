name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET Framework
        run: |
          choco install netfx-4.8-devpack -y
        shell: powershell

      - name: Build Application
        run: |
          $csc = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe"
          & $csc -nologo -out:"liveServer.exe" -target:winexe -win32icon:"src\app.ico" `
            -reference:"System.Windows.Forms.dll","System.Drawing.dll","System.Core.dll" `
            "src\liveServer.cs"
        shell: powershell

      - name: Install Inno Setup
        run: |
          choco install innosetup -y
        shell: powershell

      - name: Build Installer
        run: |
          & "C:\ProgramData\chocolatey\bin\ISCC.exe" "installer\setup.iss"
        shell: powershell

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: installer/UniversalLiveServer-*-Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
